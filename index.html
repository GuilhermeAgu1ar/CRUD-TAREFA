<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD de Tarefas</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  />
  <style>
    .bg-roxo {
      background-color: #6f42c1 !important;
    }

    .btn-roxo {
      background-color: #6f42c1;
      color: white;
    }

    .btn-roxo:hover {
      background-color: #5a35a0;
      color: white;
    }
  </style>
</head>

<body class="bg-light">
  <nav class="navbar navbar-dark bg-roxo mb-4">
    <div class="container">
      <span class="navbar-brand">CRUD de Tarefas</span>
    </div>
  </nav>

  <div class="container">

    <div id="alerta" class="alert d-none" role="alert"></div>

    <div class="card mb-4">
      <div class="card-header bg-roxo text-white">
        Cadastro de Tarefa
      </div>

      <div class="card-body">
        <form id="form-tarefa" onsubmit="salvarTarefa(this); return false;">
          
          <div class="row g-3">
            <div class="col-md-12">
              <label class="form-label">Descrição</label>
              <input
                type="text"
                class="form-control"
                name="descricao"
                placeholder="Digite a tarefa"
                required
              />
            </div>
          </div>

          <div class="mt-3">
            <button type="submit" class="btn btn-roxo">Salvar</button>

            <button
              type="reset"
              class="btn btn-outline-secondary ms-2"
              onclick="cancelarEdicao()"
            >
              Cancelar
            </button>
          </div>

        </form>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Lista de Tarefas</div>

      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>Descrição</th>
              <th>Status</th>
              <th style="width: 260px;">Ações</th>
            </tr>
          </thead>

          <tbody id="tbl-tarefas"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script type="module" src="./main.mjs"></script>

</body>
</html>
